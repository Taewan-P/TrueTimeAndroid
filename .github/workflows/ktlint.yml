name: Ktlint

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  workflow_dispatch:

jobs:
  ktlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download ktlint
        run: |
          curl -sSLo ktlint "https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint"
          chmod +x ktlint

      - name: Run ktlint
        run: |
          ./ktlint --relative '**/*.kt' '**/*.kts' '!**/build/**'
